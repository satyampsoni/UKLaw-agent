<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK LawAssistant — Legal Intelligence</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- ── Header ── -->
    <header class="header">
        <div class="header-inner">
            <div class="brand">
                <span class="brand-icon">⚖️</span>
                <h1>UK LawAssistant</h1>
                <span class="badge">Sovereign AI</span>
            </div>
            <div class="header-stats" id="header-stats">
                <span class="stat" id="stat-acts">—</span> Acts
                <span class="stat-sep">·</span>
                <span class="stat" id="stat-nodes">—</span> Sections
            </div>
        </div>
    </header>

    <!-- ── Main Layout ── -->
    <main class="main">
        <!-- Left: Q&A Panel -->
        <section class="panel panel-qa">
            <div class="panel-header">
                <h2>Ask a Legal Question</h2>
            </div>

            <!-- Question Input -->
            <div class="input-area">
                <textarea
                    id="question-input"
                    placeholder="e.g. What are the lawful bases for processing personal data under UK law?"
                    rows="3"
                    maxlength="1000"
                ></textarea>

                <div class="input-controls">
                    <div class="filter-group">
                        <label for="act-filter">Scope:</label>
                        <select id="act-filter">
                            <option value="">All Acts</option>
                            <option value="dpa-2018">Data Protection Act 2018</option>
                            <option value="osa-2023">Online Safety Act 2023</option>
                            <option value="cra-2015">Consumer Rights Act 2015</option>
                        </select>

                        <label class="toggle-label">
                            <input type="checkbox" id="strict-mode">
                            <span>Strict (quotes only)</span>
                        </label>
                    </div>

                    <button id="ask-btn" class="btn btn-primary" onclick="askQuestion()">
                        <span class="btn-text">Ask</span>
                        <span class="btn-spinner hidden">⏳</span>
                    </button>
                </div>
            </div>

            <!-- Answer Area -->
            <div id="answer-area" class="answer-area hidden">
                <div class="answer-header">
                    <h3>Answer</h3>
                    <div class="answer-meta" id="answer-meta"></div>
                </div>
                <div class="answer-content" id="answer-content"></div>
            </div>

            <!-- Conversation History -->
            <div id="history" class="history"></div>
        </section>

        <!-- Right: Sources Panel -->
        <section class="panel panel-sources">
            <div class="panel-header">
                <h2>Sources</h2>
                <span class="source-count" id="source-count"></span>
            </div>
            <div id="sources-list" class="sources-list">
                <div class="empty-state">
                    <p>Ask a question to see which legislation sections are consulted.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- ── Search Tab ── -->
    <section class="search-section">
        <div class="panel-header">
            <h2>Search Legislation</h2>
        </div>
        <div class="search-bar">
            <input
                type="text"
                id="search-input"
                placeholder="Search legislation... e.g. data protection officer"
                maxlength="500"
            >
            <select id="search-act-filter">
                <option value="">All Acts</option>
                <option value="dpa-2018">DPA 2018</option>
                <option value="osa-2023">OSA 2023</option>
                <option value="cra-2015">CRA 2015</option>
            </select>
            <button class="btn btn-secondary" onclick="searchLegislation()">Search</button>
        </div>
        <div id="search-results" class="search-results"></div>
    </section>

    <footer class="footer">
        <p>UK LawAssistant · Powered by <strong>Relax AI</strong> · Not legal advice</p>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
